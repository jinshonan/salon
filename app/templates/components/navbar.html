<!-- app/templates/components/navbar.html -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-3xl font-bold text-pink-500">
            <a href="/">Salon</a>
        </h1>

        <ul class="flex items-center gap-8 text-sm font-medium">
            <li><a href="/" class="hover:text-pink-500 transition">ホーム</a></li>
            <li><a href="/staffs" class="hover:text-pink-500 transition">スタッフ</a></li>
            <li><a href="/menus" class="hover:text-pink-500 transition">メニュー</a></li>

            {% if current_user.is_authenticated %}
                <!-- ログイン中のみ表示 -->
                <li>
                    <a href="/mypage" class="flex items-center gap-2 bg-pink-50 text-pink-600 px-4 py-2 rounded-full hover:bg-pink-100 transition">
                        {{ current_user.name }} 様
                    </a>
                </li>
            {% else %}
                <!-- 未ログイン時のみ表示 -->
                <li>
                    <a href="/login" class="bg-pink-500 text-white px-6 py-2 rounded-full hover:bg-pink-600 shadow-md transition">
                        ログイン
                    </a>
                </li>
            {% endif %}
        </ul>

    </div>
</nav>
