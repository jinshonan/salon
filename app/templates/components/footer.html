<!-- フッター -->
<footer class="bg-white border-t mt-20">
    <div class="max-w-6xl mx-auto px-6 py-12 grid md:grid-cols-3 gap-10">

        <!-- 店舗情報 -->
        <div>
            <h4 class="text-xl font-bold text-pink-500 mb-4">
                Salon
            </h4>

            {% if salon %}
            <p class="text-gray-600 leading-relaxed">
                {{ salon.address }}<br>
                TEL: {{ salon.phone }}<br>
                Email: {{ salon.email }}
            </p>
            {% else %}
            <p>
                店舗情報を準備中です。
            </p>
            {% endif %}
        </div>

        <!-- 営業時間 -->
        <div>
            <h4 class="font-semibold mb-4">
                営業時間
            </h4>   

            <ul class="text-gray-600 space-y-2">
                <li>平日 10:00 - 20:00</li>
                <li>土日 10:00 - 18:00</li>
                <li>毎週火曜 定休日</li>
            </ul>
        </div>

        <!-- ナビ -->
        <div>
            <h4 class="font-semibold mb-4">
                Menu
            </h4>

            <ul class="text-gray-600 space-y-2">
                <li><a href="/" class="hover:text-pink-500">ホーム</a></li>
                <li><a href="/staffs" class="hover:text-pink-500">スタッフ</a></li>
                <li><a href="/menus" class="hover:text-pink-500">メニュー</a></li>
                <li><a href="/reserve" class="hover:text-pink-500">予約</a></li>
            </ul>
        </div>

    </div>

    <div class="border-t py-4 text-center text-sm text-gray-500">
        © 2026 Salon. All Rights Reserved.
    </div>
</footer>
