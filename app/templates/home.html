{% extends "layouts/base.html" %}

{% block content %}

    <!-- ヒーローセクション -->
    <section class="relative overflow-hidden">
        <div class="bg-gradient-to-r from-pink-200 via-pink-100 to-white">
            <div class="max-w-6xl mx-auto px-6 py-24 grid md:grid-cols-2 gap-10 items-center">

                <!-- 左 -->
                <div>
                    <p class="text-pink-500 font-semibold mb-3 tracking-widest">
                        BEAUTY & RELAXATION
                    </p>

                    <h2 class="text-5xl font-bold leading-tight mb-6">
                        あなたの魅力を<br>
                        もっと自然に。
                    </h2>

                    <p class="text-gray-600 leading-relaxed mb-8">
                        心地よい空間と丁寧な施術で、
                        毎日を少し特別に。
                        ヘア・ネイル・リラクゼーションまで
                        幅広く対応しています。
                    </p>

                    <div class="flex gap-4">
                        <button class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-full font-semibold shadow-lg transition">
                            <a href="#reservation">今すぐ予約</a>
                        </button>

                        <button class="border border-pink-300 hover:bg-pink-100 px-8 py-3 rounded-full transition">
                            メニューを見る
                        </button>
                    </div>
                </div>

                <!-- 右 -->
                <div class="flex justify-center">
                    <div class="w-full h-[400px] rounded-3xl bg-white shadow-2xl overflow-hidden">
                        <img
                            src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?q=80&w=1200&auto=format&fit=crop"
                            alt="Salon"
                            class="w-full h-full object-cover"
                        >
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- 予約セクション -->
    <main id="reservation" class="max-w-5xl mx-auto px-6 py-20">

        <div class="bg-white rounded-3xl shadow-xl p-10 text-center">

            <h3 class="text-3xl font-bold mb-4">
                ご予約はこちら
            </h3>

            <p class="text-gray-600 mb-8">
                ご希望の日時を選択して予約できます。
            </p>

            <button class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 rounded-full transition duration-300 shadow-lg">
                <a href="/reserve">予約ページへ</a>
            </button>

        </div>

    </main>

{% endblock %}
