<!-- STEP 1 -->
<div id="step-1">

    <h3 class="text-2xl font-bold mb-8">
        メニュー選択
    </h3>

    <div class="grid md:grid-cols-3 gap-6 mb-10">

        {% for menu in menus %}

        <label class="cursor-pointer">

            <input
                type="radio"
                name="menu_id"
                value="{{ menu.id }}"
                class="hidden peer"
                required
            >

            <div class="border-2 border-gray-200 rounded-3xl p-6
                        peer-checked:border-pink-500
                        peer-checked:bg-pink-50
                        hover:border-pink-300 transition">

                <h4 class="font-bold text-lg mb-3">
                    {{ menu.name }}
                </h4>

                <p class="text-gray-600 text-sm mb-5">
                    {{ menu.description }}
                </p>

                <div class="flex justify-between">

                    <span class="text-pink-500 font-bold">
                        ¥{{ menu.price }}
                    </span>

                    <span class="text-sm text-gray-500">
                        {{ menu.duration_minutes }} 分
                    </span>

                </div>

            </div>

        </label>

        {% endfor %}

    </div>

    <div class="text-center">

        <button
            type="button"
            id="btn-go-step2"
            class="bg-pink-500 hover:bg-pink-600 text-white px-10 py-4 rounded-full">

            スタッフ選択へ

        </button>

    </div>

</div>
