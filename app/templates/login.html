<!-- login.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Salon{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Nunito',sans-serif}</style>
</head>
<body class="min-h-screen flex">

  <!-- Left: Brand panel -->
  <div class="hidden md:flex w-1/2 bg-gradient-to-br from-fuchsia-500 via-pink-500 to-red-400 flex-col justify-between p-12 relative overflow-hidden">
    <div class="absolute inset-0 opacity-20" style="background:radial-gradient(circle at 80% 20%,#fff 0%,transparent 50%),radial-gradient(circle at 10% 90%,#fff 0%,transparent 40%)"></div>
    <span class="text-white font-extrabold text-2xl tracking-widest z-10">SALON ✦</span>
    <div class="z-10">
      <p class="text-white/70 text-sm uppercase tracking-widest mb-3">Members only</p>
      <h1 class="text-white font-extrabold text-5xl leading-tight">Your glow<br>starts<br><span class="text-yellow-200">here.</span></h1>
      <p class="text-white/70 mt-4 text-sm leading-relaxed">美しさは、毎日の積み重ね。<br>あなたのペースで、輝こう。</p>
    </div>
    <div class="flex gap-3 z-10">
      <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur"></div>
      <div class="w-6 h-6 rounded-full bg-yellow-200/50 self-end"></div>
      <div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur self-end"></div>
    </div>
  </div>

  <!-- Right: Form panel -->
  <div class="w-full md:w-1/2 flex items-center justify-center bg-white px-8 py-12">
    <div class="w-full max-w-sm">
      <h2 class="text-3xl font-extrabold text-gray-900 mb-1">おかえり！👋</h2>
      <p class="text-gray-400 text-sm mb-8">ログインしてサロンへ</p>

      <form action="/login" method="POST" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1.5" for="email">メールアドレス</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="email"
            class="w-full px-4 py-3 rounded-2xl bg-gray-50 border border-gray-100 text-gray-800 text-sm placeholder-gray-300 focus:outline-none focus:border-fuchsia-400 focus:ring-2 focus:ring-fuchsia-100 transition">
        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest" for="password">パスワード</label>
            <a href="#" class="text-xs text-fuchsia-500 hover:text-fuchsia-700 font-bold transition">忘れた？</a>
          </div>
          <div class="relative">
            <input id="password" name="password" type="password" required placeholder="••••••••" autocomplete="current-password"
              class="w-full px-4 py-3 rounded-2xl bg-gray-50 border border-gray-100 text-gray-800 text-sm placeholder-gray-300 focus:outline-none focus:border-fuchsia-400 focus:ring-2 focus:ring-fuchsia-100 transition pr-11">
            <button type="button" id="togglePw" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 hover:text-fuchsia-500 transition" aria-label="パスワードを表示">
              <svg id="eyeIco" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" name="remember" class="w-4 h-4 rounded accent-fuchsia-500">
          <span class="text-sm text-gray-400">ログイン状態を保持する</span>
        </label>

        <button type="submit"
          class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white font-bold text-sm tracking-wide hover:from-fuchsia-600 hover:to-pink-600 active:scale-95 transition-all shadow-lg shadow-pink-200">
          ログイン →
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-8">まだアカウントがない？ <a href="/register" class="text-fuchsia-500 font-bold hover:underline">新規登録</a></p>
      <div class="text-center mt-4"><a href="/" class="text-xs text-gray-300 hover:text-gray-500 transition">← ホームへ戻る</a></div>
    </div>
  </div>

  <script>
    const pw=document.getElementById('password'),btn=document.getElementById('togglePw'),ico=document.getElementById('eyeIco');
    btn.onclick=()=>{const s=pw.type==='password';pw.type=s?'text':'password';ico.style.opacity=s?0.5:1};
  </script>
  <script type="module" src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
